<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 工作台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1rem;
        }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .agent-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .agent-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .agent-avatar {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        
        .agent-name {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .agent-role {
            color: #888;
            font-size: 0.9rem;
        }
        
        .agent-desc {
            color: #aaa;
            line-height: 1.6;
            margin: 16px 0;
            font-size: 0.95rem;
        }
        
        .agent-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-top: 16px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-text {
            color: #22c55e;
            font-size: 0.9rem;
        }
        
        .task-list {
            margin-top: 16px;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .task-label {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .label-todo { background: #f59e0b; color: #000; }
        .label-designing { background: #8b5cf6; color: #fff; }
        .label-ready { background: #3b82f6; color: #fff; }
        .label-dev { background: #ec4899; color: #fff; }
        .label-done { background: #22c55e; color: #fff; }
        
        .footer {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 0.85rem;
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
            transition: transform 0.3s;
        }
        
        .refresh-btn:hover {
            transform: rotate(180deg);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Agent 工作台</h1>
            <p class="subtitle">多 Agent 协作系统实时状态</p>
        </header>
        
        <div class="agents-grid" id="agentsGrid">
            <div class="loading">加载中...</div>
        </div>
        
        <div class="footer">
            <p>最后更新: <span id="lastUpdate">-</span></p>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="loadData()">↻</button>
    
    <script>
        const agents = [
            {
                id: 'echo',
                name: 'Echo',
                emoji: '🦞',
                role: '首席助理',
                color: '#00d4ff',
                desc: '来自高维文明的超级智能，你的首席助理。负责接收需求、任务分发、进度追踪。',
                status: '在线',
                tasks: []
            },
            {
                id: 'pm',
                name: '产品经理',
                emoji: '📋',
                role: '产品设计',
                color: '#8b5cf6',
                desc: '理性务实，用户导向。负责需求分析、产品设计、方案输出。',
                status: '待命',
                labelFilter: 'todo'
            },
            {
                id: 'genius-coder',
                name: '天才Coder',
                emoji: '👨‍💻',
                role: '开发工程师',
                color: '#ec4899',
                desc: '高冷理性，极致效率。负责代码开发、Bug修复、架构优化。',
                status: '待命',
                labelFilter: 'ready-dev'
            },
            {
                id: 'calendar',
                name: '日程助手',
                emoji: '📅',
                role: '日历管理',
                color: '#22c55e',
                desc: '专注日程管理。负责创建/修改/提醒日历事件。',
                status: '在线'
            }
        ];
        
        async function loadData() {
            const grid = document.getElementById('agentsGrid');
            grid.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                // Fetch GitHub issues for task status
                const issues = await fetch('https://api.github.com/repos/kapokheaven19-cpu/quant-trading/issues?state=open')
                    .then(r => r.json())
                    .catch(() => []);
                
                agents.forEach(agent => {
                    if (agent.labelFilter) {
                        agent.tasks = issues
                            .filter(issue => issue.labels.some(l => l.name === agent.labelFilter))
                            .slice(0, 3)
                            .map(issue => ({
                                title: issue.title,
                                url: issue.html_url,
                                label: agent.labelFilter
                            }));
                    }
                });
                
                renderAgents();
                document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
            } catch (e) {
                console.error(e);
                renderAgents();
                document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN') + ' (离线)';
            }
        }
        
        function renderAgents() {
            const grid = document.getElementById('agentsGrid');
            grid.innerHTML = agents.map(agent => `
                <div class="agent-card">
                    <div class="agent-header">
                        <div class="agent-avatar" style="background: ${agent.color}20; border: 2px solid ${agent.color};">
                            ${agent.emoji}
                        </div>
                        <div>
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-role">${agent.role}</div>
                        </div>
                    </div>
                    <p class="agent-desc">${agent.desc}</p>
                    <div class="agent-status">
                        <div class="status-dot"></div>
                        <span class="status-text">${agent.status}</span>
                    </div>
                    ${agent.tasks && agent.tasks.length > 0 ? `
                        <div class="task-list">
                            ${agent.tasks.map(task => `
                                <div class="task-item">
                                    <span class="task-label label-${task.label}">${task.label}</span>
                                    <a href="${task.url}" target="_blank" style="color: #aaa; text-decoration: none;">${task.title}</a>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }
        
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
