<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 工作台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --text-primary: #fff;
            --text-secondary: #8892b0;
            --accent-cyan: #00d4ff;
            --accent-purple: #7c3aed;
            --accent-pink: #ec4899;
            --accent-green: #22c55e;
            --accent-yellow: #f59e0b;
            --accent-blue: #3b82f6;
        }
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 24px;
            background-image: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.08) 0%, transparent 50%);
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 32px;
        }
        .header-left h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .header-left .subtitle { color: var(--text-secondary); font-size: 0.9rem; }
        .header-stats { display: flex; gap: 24px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--accent-cyan); cursor: pointer; transition: all 0.3s; }
        .stat-value:hover { transform: scale(1.1); text-shadow: 0 0 20px var(--accent-cyan); }
        .task-detail-panel { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); z-index: 2000; align-items: center; justify-content: center; }
        .task-detail-panel.active { display: flex; }
        .task-detail-content { width: 90%; max-width: 700px; max-height: 80vh; background: var(--bg-card); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }
        .task-detail-header { display: flex; align-items: center; justify-content: space-between; padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: var(--bg-secondary); }
        .task-detail-title { font-size: 1.2rem; font-weight: 600; }
        .task-detail-close { width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.1); color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; }
        .task-detail-close:hover { background: rgba(255, 255, 255, 0.2); color: var(--text-primary); }
        .task-detail-list { flex: 1; overflow-y: auto; padding: 16px; }
        .task-detail-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; margin-bottom: 10px; }
        .task-detail-item:hover { background: rgba(255, 255, 255, 0.06); }
        .task-detail-number { font-size: 0.8rem; color: var(--text-secondary); min-width: 30px; }
        .task-detail-title-text { flex: 1; font-size: 0.9rem; line-height: 1.4; }
        .task-detail-title-text a { color: inherit; text-decoration: none; }
        .task-detail-title-text a:hover { color: var(--accent-cyan); }
        .task-detail-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 0.75rem; color: var(--text-secondary); }
        .task-detail-empty { text-align: center; padding: 40px; color: var(--text-secondary); }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; }
        .pipeline {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .pipeline-stage {
            flex: 1;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            position: relative;
        }
        .pipeline-stage::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 12px 12px 0 0;
        }
        .pipeline-stage.todo { background: rgba(245, 158, 11, 0.15); }
        .pipeline-stage.todo::before { background: var(--accent-yellow); }
        .pipeline-stage.designing { background: rgba(139, 92, 246, 0.15); }
        .pipeline-stage.designing::before { background: var(--accent-purple); }
        .pipeline-stage.ready-dev { background: rgba(59, 130, 246, 0.15); }
        .pipeline-stage.ready-dev::before { background: var(--accent-blue); }
        .pipeline-stage.in-dev { background: rgba(236, 72, 153, 0.15); }
        .pipeline-stage.in-dev::before { background: var(--accent-pink); }
        .pipeline-stage.done { background: rgba(34, 197, 94, 0.15); }
        .pipeline-stage.done::before { background: var(--accent-green); }
        .pipeline-count { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
        .pipeline-label { font-size: 0.8rem; color: var(--text-secondary); }
        .agents-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .agent-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            position: relative;
        }
        .agent-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--agent-color, var(--accent-cyan));
            opacity: 0.8;
        }
        .agent-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        .agent-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .agent-avatar {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--agent-color, var(--accent-cyan));
        }
        .agent-info h3 { font-size: 1.25rem; font-weight: 600; margin-bottom: 2px; }
        .agent-role { color: var(--text-secondary); font-size: 0.85rem; }
        .agent-desc { color: var(--text-secondary); line-height: 1.6; margin: 16px 0; font-size: 0.9rem; }
        .chat-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--agent-color, var(--accent-cyan)), var(--accent-purple));
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
        }
        .chat-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3); }
        .agent-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .agent-status.online { background: rgba(34, 197, 94, 0.15); color: var(--accent-green); }
        .agent-status.working { background: rgba(236, 72, 153, 0.15); color: var(--accent-pink); }
        .agent-status.standby { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .task-progress { margin-top: 16px; }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
        .progress-label { color: var(--text-secondary); }
        .progress-value { color: var(--accent-cyan); font-weight: 600; }
        .progress-bar { height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple)); border-radius: 3px; transition: width 0.5s; }
        .task-list { margin-top: 16px; }
        .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 10px; margin-bottom: 8px; }
        .task-label { padding: 3px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; white-space: nowrap; }
        .label-todo { background: var(--accent-yellow); color: #000; }
        .label-designing { background: var(--accent-purple); color: #fff; }
        .label-ready-dev { background: var(--accent-blue); color: #fff; }
        .label-in-dev { background: var(--accent-pink); color: #fff; }
        .label-done { background: var(--accent-green); color: #fff; }
        .task-title { flex: 1; font-size: 0.85rem; color: var(--text-secondary); line-height: 1.4; }
        .task-title a { color: inherit; text-decoration: none; }
        .task-title a:hover { color: var(--accent-cyan); }
        .footer { display: flex; justify-content: space-between; align-items: center; padding: 24px 0; margin-top: 32px; border-top: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-secondary); font-size: 0.8rem; }
        .refresh-btn {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
            transition: all 0.3s ease;
            z-index: 100;
        }
        .refresh-btn:hover { transform: rotate(180deg) scale(1.1); }
        .refresh-btn.loading { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .chat-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); z-index: 1000; align-items: center; justify-content: center; }
        .chat-modal.active { display: flex; }
        .chat-panel { width: 90%; max-width: 600px; height: 80vh; max-height: 700px; background: var(--bg-card); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: var(--bg-secondary); }
        .chat-header-left { display: flex; align-items: center; gap: 12px; }
        .chat-avatar { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: rgba(255, 255, 255, 0.05); border: 2px solid var(--agent-color, var(--accent-cyan)); }
        .chat-agent-name { font-size: 1.1rem; font-weight: 600; }
        .chat-agent-role { font-size: 0.8rem; color: var(--text-secondary); }
        .chat-close { width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.1); color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; }
        .chat-close:hover { background: rgba(255, 255, 255, 0.2); color: var(--text-primary); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .message { display: flex; gap: 12px; max-width: 85%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
        .message.user .message-avatar { background: var(--accent-cyan); }
        .message.agent .message-avatar { background: var(--agent-color, var(--accent-purple)); }
        .message-content { padding: 12px 16px; border-radius: 16px; font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; }
        .message.user .message-content { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); color: white; border-bottom-right-radius: 4px; }
        .message.agent .message-content { background: rgba(255, 255, 255, 0.08); border-bottom-left-radius: 4px; }
        .message.loading .message-content { color: var(--text-secondary); font-style: italic; }
        .chat-input-area { padding: 16px 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; gap: 12px; background: var(--bg-secondary); }
        .chat-input { flex: 1; padding: 14px 18px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); background: var(--bg-primary); color: var(--text-primary); font-size: 0.9rem; outline: none; }
        .chat-input:focus { border-color: var(--accent-cyan); }
        .chat-input::placeholder { color: var(--text-secondary); }
        .chat-send-btn { padding: 14px 24px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); color: white; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
        .chat-send-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0, 212, 255, 0.3); }
        .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .agent-selector { padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: var(--bg-secondary); }
        .agent-selector-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 12px; }
        .agent-selector-list { display: flex; gap: 8px; flex-wrap: wrap; }
        .agent-selector-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); background: transparent; color: var(--text-secondary); font-size: 0.8rem; cursor: pointer; }
        .agent-selector-btn:hover { border-color: var(--accent-cyan); color: var(--text-primary); }
        .agent-selector-btn.active { background: rgba(0, 212, 255, 0.15); border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .loading { text-align: center; padding: 60px; color: var(--text-secondary); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255, 255, 255, 0.1); border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 20px; text-align: center; }
            .pipeline { flex-wrap: wrap; }
            .pipeline-stage { min-width: calc(50% - 6px); }
            .chat-panel { width: 100%; height: 100%; max-height: 100%; border-radius: 0; }
        }
        
        /* 工作流配置 */
        .workflow-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); z-index: 3000; align-items: center; justify-content: center; }
        .workflow-modal.active { display: flex; }
        .workflow-modal-content { width: 95%; max-width: 1100px; max-height: 90vh; background: var(--bg-card); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }
        .workflow-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: var(--bg-secondary); }
        .workflow-modal-title { font-size: 1.2rem; font-weight: 600; }
        .workflow-modal-close { width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.1); color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; }
        .workflow-modal-close:hover { background: rgba(255, 255, 255, 0.2); color: var(--text-primary); }
        .workflow-modal-body { flex: 1; display: flex; overflow: hidden; }
        .workflow-sidebar { width: 280px; padding: 20px; border-right: 1px solid rgba(255, 255, 255, 0.1); background: var(--bg-secondary); overflow-y: auto; }
        .workflow-sidebar h3 { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .workflow-name-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background: var(--bg-primary); color: var(--text-primary); font-size: 0.9rem; margin-bottom: 20px; }
        .workflow-name-input:focus { border-color: var(--accent-cyan); outline: none; }
        .workflow-agent-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .workflow-agent-btn { padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); background: transparent; color: var(--text-primary); font-size: 0.85rem; cursor: pointer; text-align: left; transition: all 0.2s; }
        .workflow-agent-btn:hover { border-color: var(--accent-cyan); background: rgba(0, 212, 255, 0.1); }
        .workflow-actions { display: flex; flex-direction: column; gap: 8px; }
        .workflow-btn { padding: 12px 16px; border-radius: 10px; border: none; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .workflow-btn-primary { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); color: white; }
        .workflow-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0, 212, 255, 0.3); }
        .workflow-btn-secondary { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }
        .workflow-btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }
        .workflow-btn-danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .workflow-canvas-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg-primary); }
        .workflow-canvas { width: 100%; height: 100%; position: relative; min-height: 500px; }
        .workflow-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .workflow-node { position: absolute; width: 120px; padding: 12px; border-radius: 12px; background: var(--bg-card); border: 2px solid var(--agent-color, var(--accent-cyan)); cursor: move; user-select: none; transition: box-shadow 0.2s; }
        .workflow-node:hover { box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); }
        .workflow-node.selected { box-shadow: 0 0 0 3px var(--accent-cyan); }
        .workflow-node-header { font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }
        .workflow-node-body { font-size: 0.7rem; color: var(--text-secondary); }
        .workflow-node-connect { position: absolute; right: -8px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; border-radius: 50%; background: var(--accent-cyan); cursor: crosshair; }
        .workflow-item { display: flex; align-items: center; gap: 8px; padding: 12px; border-radius: 8px; background: rgba(255, 255, 255, 0.03); margin-bottom: 8px; cursor: pointer; transition: background 0.2s; }
        .workflow-item:hover { background: rgba(255, 255, 255, 0.08); }
        .workflow-item span:first-child { flex: 1; font-size: 0.85rem; }
        .workflow-meta { font-size: 0.7rem; color: var(--text-secondary); }
        .workflow-delete { width: 24px; height: 24px; border-radius: 6px; border: none; background: rgba(239, 68, 68, 0.2); color: #ef4444; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
        .workflow-delete:hover { background: rgba(239, 68, 68, 0.4); }
        .workflow-empty { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 0.85rem; }
        
        /* 执行模态框 */
        .execute-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); z-index: 3000; align-items: center; justify-content: center; }
        .execute-modal.active { display: flex; }
        .execute-modal-content { width: 90%; max-width: 800px; max-height: 80vh; background: var(--bg-card); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }
        .execute-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: var(--bg-secondary); }
        .execute-modal-body { flex: 1; padding: 20px; overflow-y: auto; }
        .execute-select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background: var(--bg-primary); color: var(--text-primary); font-size: 0.9rem; margin-bottom: 16px; }
        .execute-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background: var(--bg-primary); color: var(--text-primary); font-size: 0.9rem; margin-bottom: 16px; min-height: 80px; resize: vertical; }
        .execute-input:focus { border-color: var(--accent-cyan); outline: none; }
        .execute-results { margin-top: 20px; }
        .execute-result { margin-bottom: 16px; padding: 16px; border-radius: 12px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .execute-result-header { font-size: 0.8rem; font-weight: 600; color: var(--accent-cyan); margin-bottom: 8px; }
        .execute-result-content { font-size: 0.85rem; line-height: 1.6; white-space: pre-wrap; color: var(--text-secondary); }
        
        .header-actions { display: flex; gap: 12px; }
        .header-action-btn { padding: 10px 18px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); background: transparent; color: var(--text-secondary); font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .header-action-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); background: rgba(0, 212, 255, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>🤖 Agent 工作台</h1>
                <p class="subtitle">多 Agent 协作系统 · 实时状态监控</p>
            </div>
            <div class="header-stats">
                <div class="stat-item"><div class="stat-value" id="totalTasks">-</div><div class="stat-label">总任务</div></div>
                <div class="stat-item"><div class="stat-value" id="activeAgents">-</div><div class="stat-label">在线 Agent</div></div>
                <div class="stat-item"><div class="stat-value" id="completedTasks">-</div><div class="stat-label">已完成</div></div>
            </div>
            <div class="header-actions">
                <button class="header-action-btn" onclick="showWorkflowModal()">⚙️ 工作流配置</button>
                <button class="header-action-btn" onclick="showExecuteModal()">▶️ 执行工作流</button>
            </div>
        </header>
        <div class="pipeline" id="pipeline">
            <div class="pipeline-stage todo"><div class="pipeline-count" id="count-todo">-</div><div class="pipeline-label">待处理</div></div>
            <div class="pipeline-stage designing"><div class="pipeline-count" id="count-designing">-</div><div class="pipeline-label">设计中</div></div>
            <div class="pipeline-stage ready-dev"><div class="pipeline-count" id="count-ready-dev">-</div><div class="pipeline-label">待开发</div></div>
            <div class="pipeline-stage in-dev"><div class="pipeline-count" id="count-in-dev">-</div><div class="pipeline-label">开发中</div></div>
            <div class="pipeline-stage done"><div class="pipeline-count" id="count-done">-</div><div class="pipeline-label">已完成</div></div>
        </div>

    <div class="task-detail-panel" id="taskDetailPanel">
        <div class="task-detail-content">
            <div class="task-detail-header">
                <div class="task-detail-title" id="taskDetailTitle">任务详情</div>
                <button class="task-detail-close" onclick="closeTaskDetail()">×</button>
            </div>
            <div class="task-detail-list" id="taskDetailList"></div>
        </div>
    </div>
    <div class="chat-modal" id="chatModal">
        <div class="chat-panel">
            <div class="chat-header">
                <div class="chat-header-left">
                    <div class="chat-avatar" id="chatAvatar">🤖</div>
                    <div><div class="chat-agent-name" id="chatAgentName">Agent</div><div class="chat-agent-role" id="chatAgentRole">在线</div></div>
                </div>
                <button class="chat-close" onclick="closeChat()">×</button>
            </div>

                <div class="agent-selector-label">选择对话 Agent</div>

            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="输入消息..." onkeypress="handleChatKeypress(event)">
                <button class="chat-send-btn" id="chatSendBtn" onclick="sendMessage()">发送</button>

    <!-- 工作流配置模态框 -->
    <div class="workflow-modal" id="workflowModal">
        <div class="workflow-modal-content">
            <div class="workflow-modal-header">
                <div class="workflow-modal-title">⚙️ 工作流配置</div>
                <button class="workflow-modal-close" onclick="hideWorkflowModal()">×</button>
            </div>
            <div class="workflow-modal-body">
                <div class="workflow-sidebar">
                    <h3>工作流名称</h3>
                    <input type="text" class="workflow-name-input" id="workflowName" placeholder="输入工作流名称...">
                    
                    <h3>已保存工作流</h3>
                    <div id="workflowsList"></div>
                    
                    <h3>添加节点</h3>
                    <div class="workflow-agent-list">
                        <button class="workflow-agent-btn" onclick="addWorkflowNode('echo', 'Echo')">🦞 Echo</button>
                        <button class="workflow-agent-btn" onclick="addWorkflowNode('pm', 'PM Agent')">📋 PM Agent</button>
                        <button class="workflow-agent-btn" onclick="addWorkflowNode('genius-coder', '天才Coder')">👨‍💻 天才Coder</button>
                        <button class="workflow-agent-btn" onclick="addWorkflowNode('calendar', '日程助手')">📅 日程助手</button>
                    </div>
                    
                    <div class="workflow-actions">
                        <button class="workflow-btn workflow-btn-primary" onclick="saveWorkflow()">💾 保存工作流</button>
                        <button class="workflow-btn workflow-btn-secondary" onclick="clearWorkflowCanvas()">🗑️ 清空画布</button>

                    </div>

                    <div class="workflow-canvas" id="workflowCanvas"></div>

    <!-- 执行工作流模态框 -->
    <div class="execute-modal" id="executeModal">
        <div class="execute-modal-content">
            <div class="execute-modal-header">
                <div class="workflow-modal-title">▶️ 执行工作流</div>
                <button class="workflow-modal-close" onclick="document.getElementById('executeModal').classList.remove('active')">×</button>
            </div>
            <div class="execute-modal-body">
                <select class="execute-select" id="executeWorkflowSelect"></select>
                <textarea class="execute-input" id="executeInput" placeholder="输入任务描述..."></textarea>
                <button class="workflow-btn workflow-btn-primary" id="executeBtn" onclick="executeWorkflow()">▶️ 执行</button>
                <div class="execute-results" id="executeResults"></div>
            </div>
        </div>
    </div>
    
    <script>
        const agents = [
            { id: 'echo', name: 'Echo', emoji: '🦞', role: '首席助理', color: '#00d4ff', desc: '来自高维文明的超级智能，你的首席助理。负责接收需求、任务分发、进度追踪。', status: 'online', statusText: '在线', labelFilter: null },
            { id: 'pm', name: 'PM Agent', emoji: '📋', role: '产品设计', color: '#8b5cf6', desc: '理性务实，用户导向。负责需求分析、产品设计、方案输出。', status: 'standby', statusText: '待命中', labelFilter: 'todo' },
            { id: 'genius-coder', name: '天才Coder', emoji: '👨‍💻', role: '开发工程师', color: '#ec4899', desc: '高冷理性，极致效率。负责代码开发、Bug修复、架构优化。', status: 'working', statusText: '工作中', labelFilter: 'ready-dev' },
            { id: 'calendar', name: '日程助手', emoji: '📅', role: '日历管理', color: '#22c55e', desc: '专注日程管理。负责创建/修改/提醒日历事件。', status: 'online', statusText: '在线', labelFilter: null }
        ];
        let currentAgent = agents[0];
        let chatHistory = [];
        let allTasks = [];
        const labelMap = { 'todo': { class: 'label-todo', text: '待处理' }, 'designing': { class: 'label-designing', text: '设计中' }, 'ready-dev': { class: 'label-ready-dev', text: '待开发' }, 'in-dev': { class: 'label-in-dev', text: '开发中' }, 'done': { class: 'label-done', text: '已完成' } };
        
        async function loadData() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('loading');
            const grid = document.getElementById('agentsGrid');
            grid.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>加载中...</div></div>';
            try {
                const response = await fetch('https://api.github.com/repos/kapokheaven19-cpu/quant-trading/issues?state=all&per_page=100');
                const issues = await response.json();
                if (!Array.isArray(issues)) throw new Error('Failed to fetch issues');
                const pipelineCounts = { todo: 0, designing: 0, 'ready-dev': 0, 'in-dev': 0, done: 0 };
                let totalTasks = 0, completedTasks = 0;
                allTasks = [];
                issues.forEach(issue => {
                    if (issue.pull_request) return;
                    const task = { number: issue.number, title: issue.title, url: issue.html_url, labels: issue.labels.map(l => l.name), created: issue.created_at };
                    allTasks.push(task);
                    totalTasks++;
                    const labels = issue.labels.map(l => l.name);
                    if (labels.includes('done')) { completedTasks++; pipelineCounts['done']++; }
                    else if (labels.includes('in-dev')) pipelineCounts['in-dev']++;
                    else if (labels.includes('ready-dev')) pipelineCounts['ready-dev']++;
                    else if (labels.includes('designing')) pipelineCounts['designing']++;
                    else if (labels.includes('todo')) pipelineCounts['todo']++;
                });
                document.getElementById('totalTasks').textContent = totalTasks;
                document.getElementById('completedTasks').textContent = completedTasks;
                document.getElementById('activeAgents').textContent = agents.filter(a => a.status === 'online' || a.status === 'working').length;
                document.getElementById('count-todo').textContent = pipelineCounts.todo;
                document.getElementById('count-designing').textContent = pipelineCounts.designing;
                document.getElementById('count-ready-dev').textContent = pipelineCounts['ready-dev'];
                document.getElementById('count-in-dev').textContent = pipelineCounts['in-dev'];
                document.getElementById('count-done').textContent = pipelineCounts.done;
                agents.forEach(agent => {
                    if (agent.labelFilter) {
                        agent.tasks = issues.filter(issue => !issue.pull_request && issue.labels.some(l => l.name === agent.labelFilter)).slice(0, 5).map(issue => ({ title: issue.title, url: issue.html_url, number: issue.number, label: agent.labelFilter }));
                    } else { agent.tasks = []; }
                });
                renderAgents();
                renderAgentSelector();
                // 绑定统计数字点击事件
                document.getElementById('totalTasks').onclick = () => openTaskDetail('all', '全部任务 (' + allTasks.length + ')');
                document.getElementById('completedTasks').onclick = () => openTaskDetail('done', '已完成任务 (' + completedTasks + ')');
                document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
            } catch (e) {
                console.error('Load error:', e);
                renderAgents();
                renderAgentSelector();
                document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN') + ' (离线)';
            } finally { btn.classList.remove('loading'); }
        }
        
        let storedAllTasks = [];
        function openTaskDetail(filter, title) {
            storedAllTasks = allTasks || [];
            const filtered = filter === 'done' ? storedAllTasks.filter(t => t.labels.includes('done')) : storedAllTasks;
            document.getElementById('taskDetailTitle').textContent = title;
            const list = document.getElementById('taskDetailList');
            if (filtered.length === 0) {
                list.innerHTML = '<div class="task-detail-empty">暂无任务</div>';
            } else {
                list.innerHTML = filtered.map(t => '<div class="task-detail-item"><div class="task-detail-number">#' + t.number + '</div><div class="task-detail-title-text"><a href="' + t.url + '" target="_blank">' + t.title + '</a><div class="task-detail-meta"><span>' + (t.labels.includes('done') ? '✅ 已完成' : t.labels.includes('in-dev') ? '🔵 开发中' : t.labels.includes('ready-dev') ? '🟢 待开发' : '🟡 待处理') + '</span><span>' + new Date(t.created).toLocaleDateString('zh-CN') + '</span></div></div></div>').join('');
            }
            document.getElementById('taskDetailPanel').classList.add('active');
        }
        function closeTaskDetail() { document.getElementById('taskDetailPanel').classList.remove('active'); }
        
        function renderAgents() {
            const grid = document.getElementById('agentsGrid');
            grid.innerHTML = agents.map(agent => {
                const progress = agent.tasks.length > 0 ? Math.min(100, (agent.tasks.length / 3) * 100) : 0;
                return '<div class="agent-card" style="--agent-color: ' + agent.color + '">' +
                    '<div class="agent-header"><div class="agent-avatar">' + agent.emoji + '</div><div><h3>' + agent.name + '</h3><div class="agent-role">' + agent.role + '</div></div></div>' +
                    '<div class="agent-status ' + agent.status + '"><span class="status-dot"></span>' + agent.statusText + '</div>' +
                    '<p class="agent-desc">' + agent.desc + '</p>' +
                    (agent.labelFilter ? '<div class="task-progress"><div class="progress-header"><span class="progress-label">当前任务</span><span class="progress-value">' + agent.tasks.length + ' 个</span></div><div class="progress-bar"><div class="progress-fill" style="width: ' + progress + '%"></div></div></div>' : '') +
                    (agent.tasks && agent.tasks.length > 0 ? '<div class="task-list">' + agent.tasks.map(task => '<div class="task-item"><span class="task-label ' + (labelMap[task.label]?.class || '') + '">' + (labelMap[task.label]?.text || task.label) + '</span><div class="task-title"><a href="' + task.url + '" target="_blank" title="' + task.title + '">#' + task.number + ' ' + (task.title.length > 40 ? task.title.substring(0, 40) + '...' : task.title) + '</a></div></div>').join('') + '</div>' : (agent.labelFilter ? '<div class="task-list"><div class="task-item" style="justify-content: center; color: var(--text-secondary);">暂无任务</div></div>' : '')) +
                    '<button class="chat-btn" style="--agent-color: ' + agent.color + '" onclick="openChat(\'' + agent.id + '\')">💬 对话</button></div>';
            }).join('');
        }
        
        function renderAgentSelector() {
            const selector = document.getElementById('agentSelector');
            selector.innerHTML = agents.map(agent => '<button class="agent-selector-btn ' + (agent.id === currentAgent.id ? 'active' : '') + '" onclick="switchAgent(\'' + agent.id + '\')">' + agent.emoji + ' ' + agent.name + '</button>').join('');
        }
        
        function openChat(agentId) {
            currentAgent = agents.find(a => a.id === agentId) || agents[0];
            chatHistory = [];
            document.getElementById('chatModal').classList.add('active');
            document.getElementById('chatAvatar').textContent = currentAgent.emoji;
            document.getElementById('chatAgentName').textContent = currentAgent.name;
            document.getElementById('chatAgentRole').textContent = currentAgent.statusText;
            renderAgentSelector();
            renderMessages();
            document.getElementById('chatInput').focus();
        }
        
        function closeChat() { document.getElementById('chatModal').classList.remove('active'); }
        
        function switchAgent(agentId) {
            currentAgent = agents.find(a => a.id === agentId) || agents[0];
            chatHistory = [];
            document.getElementById('chatAvatar').textContent = currentAgent.emoji;
            document.getElementById('chatAgentName').textContent = currentAgent.name;
            document.getElementById('chatAgentRole').textContent = currentAgent.statusText;
            renderAgentSelector();
            renderMessages();
        }
        
        function renderMessages() {
            const container = document.getElementById('chatMessages');
            if (chatHistory.length === 0) {
                container.innerHTML = '<div class="message agent"><div class="message-avatar">' + currentAgent.emoji + '</div><div class="message-content">你好！我是 ' + currentAgent.name + '。有什么可以帮你的？</div></div>';
            } else {
                container.innerHTML = chatHistory.map(msg => '<div class="message ' + msg.role + '"><div class="message-avatar">' + (msg.role === 'user' ? '👤' : currentAgent.emoji) + '</div><div class="message-content' + (msg.loading ? ' loading' : '') + '">' + msg.content + '</div></div>').join('');
            }
            container.scrollTop = container.scrollHeight;
        }
        
        function extractAgentResponse(data) {
            // 提取 Agent 的纯文本回答，过滤技术信息
            if (!data) return '收到回复';
            
            let response = '';
            
            // 情况1: data.result.response 存在
            if (data.result?.response) {
                response = data.result.response;
            }
            // 情况2: data.result 本身就是字符串
            else if (typeof data.result === 'string') {
                response = data.result;
            }
            // 情况3: data.response 存在
            else if (data.response) {
                response = data.response;
            }
            // 情况4: 整个 data 就是字符串
            else if (typeof data === 'string') {
                response = data;
            }
            
            // 已经是纯文本，直接返回
            if (typeof response !== 'string') {
                return JSON.stringify(response);
            }
            
            // 尝试解析 JSON 字符串（OpenClaw 输出可能是 JSON 字符串）
            try {
                const parsed = JSON.parse(response);
                // 递归提取
                return extractAgentResponse(parsed);
            } catch {
                // 不是 JSON，继续处理
            }
            
            // 过滤技术信息
            // 1. 移除 thinking 块
            response = response.replace(/<think>[\s\S]*?</think>/g, '');
            
            // 2. 移除工具调用信息
            response = response.replace(/\[(?:tool_call|tool_use|tool_invocation|function_call).*?\]/gi, '');
            response = response.replace(/<(?:tool_call|tool_use|tool_invocation|function_call).*?<\/(?:tool_call|tool_use|tool_invocation|function_call)>/gis, '');
            
            // 3. 移除 JSON 对象中的技术键（只保留 content/message/text 字段）
            const jsonMatch = response.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
                try {
                    const obj = JSON.parse(jsonMatch[0]);
                    const textFields = ['content', 'message', 'text', 'reply', 'answer', 'response'];
                    for (const field of textFields) {
                        if (obj[field]) {
                            response = obj[field];
                            break;
                        }
                    }
                } catch {}
            }
            
            // 4. 移除 <final> 标签外的所有内容（OpenClaw 输出格式）
            const finalMatch = response.match(/<final>([\s\S]*?)<\/final>/i);
            if (finalMatch) {
                response = finalMatch[1].trim();
            }
            
            // 5. 清理多余空白
            response = response.trim();
            
            // 6. 如果处理后为空，返回默认消息
            if (!response) {
                return '收到回复';
            }
            
            return response;
        }
        
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('chatSendBtn');
            const message = input.value.trim();
            if (!message || sendBtn.disabled) return;
            chatHistory.push({ role: 'user', content: message });
            input.value = '';
            chatHistory.push({ role: 'agent', content: '正在思考...', loading: true });
            renderMessages();
            sendBtn.disabled = true;
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agentId: currentAgent.id, message: message })
                });
                const data = await res.json();
                chatHistory.pop();
                // 使用 extractAgentResponse 提取纯文本回答
                const agentResponse = extractAgentResponse(data.result || data);
                chatHistory.push({ role: 'agent', content: agentResponse });
            } catch (e) {
                chatHistory.pop();
                chatHistory.push({ role: 'agent', content: '抱歉，连接失败。请确保 API 服务已启动。' });
            }
            renderMessages();
            sendBtn.disabled = false;
            input.focus();
        }
        
        function handleChatKeypress(e) { if (e.key === 'Enter') sendMessage(); }
        
        // ===== 工作流配置 =====
        let workflowModal = null;
        let workflowCanvas = null;
        let workflowNodes = [];
        let workflowConnections = [];
        let draggingNode = null;
        let connectingFrom = null;
        
        function initWorkflowModal() {
            const modal = document.getElementById('workflowModal');
            const canvas = document.getElementById('workflowCanvas');
            if (!modal || !canvas) return;
            
            workflowModal = modal;
            workflowCanvas = canvas;
            
            // 加载已有工作流
            loadWorkflowsList();
            
            // 绑定事件
            canvas.addEventListener('mousedown', handleCanvasMouseDown);
            canvas.addEventListener('mousemove', handleCanvasMouseMove);
            canvas.addEventListener('mouseup', handleCanvasMouseUp);
        }
        
        async function loadWorkflowsList() {
            try {
                const res = await fetch('/api/workflows');
                const workflows = await res.json();
                const list = document.getElementById('workflowsList');
                if (list) {
                    list.innerHTML = workflows.map(w => `
                        <div class="workflow-item" onclick="openWorkflow('${w.id}')">
                            <span>${w.name}</span>
                            <span class="workflow-meta">${w.nodes.length} 个节点</span>
                            <button class="workflow-delete" onclick="event.stopPropagation();deleteWorkflow('${w.id}')">×</button>
                        </div>
                    `).join('') || '<div class="workflow-empty">暂无工作流</div>';
                }
            } catch (e) {
                console.error('加载工作流失败:', e);
            }
        }
        
        function showWorkflowModal() {
            workflowModal.classList.add('active');
            clearWorkflowCanvas();
        }
        
        function hideWorkflowModal() {
            workflowModal.classList.remove('active');
        }
        
        function clearWorkflowCanvas() {
            workflowNodes = [];
            workflowConnections = [];
            renderWorkflowCanvas();
        }
        
        function renderWorkflowCanvas() {
            if (!workflowCanvas) return;
            
            // 渲染连接线
            let svg = '<svg class="workflow-svg">';
            workflowConnections.forEach(conn => {
                const from = workflowNodes.find(n => n.id === conn.source);
                const to = workflowNodes.find(n => n.id === conn.target);
                if (from && to) {
                    svg += `<line x1="${from.x + 60}" y1="${from.y + 30}" x2="${to.x + 60}" y2="${to.y + 30}" stroke="#00d4ff" stroke-width="2"/>`;
                }
            });
            svg += '</svg>';
            
            // 渲染节点
            const nodesHtml = workflowNodes.map(node => `
                <div class="workflow-node" style="left:${node.x}px;top:${node.y}px;--agent-color:${node.color || '#00d4ff'}" 
                     data-id="${node.id}" draggable="true">
                    <div class="workflow-node-header">${node.name}</div>
                    <div class="workflow-node-body">${node.agentId}</div>
                    <div class="workflow-node-connect"></div>
                </div>
            `).join('');
            
            workflowCanvas.innerHTML = svg + nodesHtml;
            
            // 绑定节点事件
            workflowCanvas.querySelectorAll('.workflow-node').forEach(el => {
                el.addEventListener('mousedown', e => {
                    if (e.target.classList.contains('workflow-node-connect')) {
                        connectingFrom = el.dataset.id;
                    } else {
                        draggingNode = { id: el.dataset.id, startX: e.clientX, startY: e.clientY, nodeX: 0, nodeY: 0 };
                        const node = workflowNodes.find(n => n.id === draggingNode.id);
                        if (node) {
                            draggingNode.nodeX = node.x;
                            draggingNode.nodeY = node.y;
                        }
                    }
                });
            });
        }
        
        function handleCanvasMouseDown(e) {
            // 拖拽节点
        }
        
        function handleCanvasMouseMove(e) {
            if (draggingNode) {
                const dx = e.clientX - draggingNode.startX;
                const dy = e.clientY - draggingNode.startY;
                const node = workflowNodes.find(n => n.id === draggingNode.id);
                if (node) {
                    node.x = draggingNode.nodeX + dx;
                    node.y = draggingNode.nodeY + dy;
                    renderWorkflowCanvas();
                }
            }
        }
        
        function handleCanvasMouseUp(e) {
            if (connectingFrom) {
                const target = e.target.closest('.workflow-node');
                if (target && target.dataset.id !== connectingFrom) {
                    workflowConnections.push({ source: connectingFrom, target: target.dataset.id });
                    renderWorkflowCanvas();
                }
                connectingFrom = null;
            }
            draggingNode = null;
        }
        
        function addWorkflowNode(agentId, agentName) {
            const colors = ['#00d4ff', '#7c3aed', '#ec4899', '#22c55e', '#f59e0b', '#3b82f6'];
            const color = colors[workflowNodes.length % colors.length];
            workflowNodes.push({
                id: 'node_' + Date.now(),
                agentId: agentId,
                name: agentName,
                x: 50 + (workflowNodes.length % 3) * 150,
                y: 50 + Math.floor(workflowNodes.length / 3) * 120,
                color: color
            });
            renderWorkflowCanvas();
        }
        
        function removeSelectedNode() {
            const selected = workflowCanvas.querySelector('.workflow-node.selected');
            if (selected) {
                const nodeId = selected.dataset.id;
                workflowNodes = workflowNodes.filter(n => n.id !== nodeId);
                workflowConnections = workflowConnections.filter(c => c.source !== nodeId && c.target !== nodeId);
                renderWorkflowCanvas();
            }
        }
        
        let currentWorkflowId = null;
        
        function openWorkflow(id) {
            currentWorkflowId = id;
            fetch('/api/workflows')
                .then(r => r.json())
                .then(workflows => {
                    const wf = workflows.find(w => w.id === id);
                    if (wf) {
                        workflowNodes = wf.nodes || [];
                        workflowConnections = wf.connections || [];
                        renderWorkflowCanvas();
                        document.getElementById('workflowName').value = wf.name;
                    }
                });
        }
        
        async function saveWorkflow() {
            const name = document.getElementById('workflowName').value.trim();
            if (!name) {
                alert('请输入工作流名称');
                return;
            }
            if (workflowNodes.length === 0) {
                alert('请添加至少一个节点');
                return;
            }
            
            const workflow = {
                id: currentWorkflowId || '',
                name: name,
                nodes: workflowNodes,
                connections: workflowConnections
            };
            
            try {
                const res = await fetch('/api/workflows', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(workflow)
                });
                const data = await res.json();
                if (data.success) {
                    currentWorkflowId = data.workflow.id;
                    loadWorkflowsList();
                    alert('保存成功');
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }
        
        async function deleteWorkflow(id) {
            if (!confirm('确定删除此工作流?')) return;
            try {
                await fetch('/api/workflows?id=' + id, { method: 'DELETE' });
                loadWorkflowsList();
                if (currentWorkflowId === id) {
                    clearWorkflowCanvas();
                    currentWorkflowId = null;
                }
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }
        
        let executeModal = null;
        
        function showExecuteModal() {
            executeModal = document.getElementById('executeModal');
            executeModal.classList.add('active');
            loadWorkflowsForExecute();
        }
        
        async function loadWorkflowsForExecute() {
            try {
                const res = await fetch('/api/workflows');
                const workflows = await res.json();
                const select = document.getElementById('executeWorkflowSelect');
                select.innerHTML = workflows.map(w => `<option value="${w.id}">${w.name}</option>`).join('');
            } catch (e) {
                console.error('加载工作流失败:', e);
            }
        }
        
        async function executeWorkflow() {
            const workflowId = document.getElementById('executeWorkflowSelect').value;
            const input = document.getElementById('executeInput').value.trim();
            if (!input) {
                alert('请输入任务描述');
                return;
            }
            
            const btn = document.getElementById('executeBtn');
            btn.disabled = true;
            btn.textContent = '执行中...';
            
            try {
                const res = await fetch('/api/workflows/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ workflowId, input })
                });
                const data = await res.json();
                
                if (data.success) {
                    const results = document.getElementById('executeResults');
                    results.innerHTML = data.results.map(r => `
                        <div class="execute-result">
                            <div class="execute-result-header">${r.agentId}</div>
                            <div class="execute-result-content">${r.response}</div>
                        </div>
                    `).join('');
                } else {
                    alert('执行失败: ' + data.error);
                }
            } catch (e) {
                alert('执行失败: ' + e.message);
            }
            
            btn.disabled = false;
            btn.textContent = '执行';
        }
        
        loadData();
        setInterval(loadData, 30000);
        // 初始化工作流
        initWorkflowModal();
    </script>
</body>
</html>
